messaging:
  provider: cli  # cli | telegram | slack

  telegram:
    token: "${TELEGRAM_TOKEN}"
    allowed_user_ids: []  # Empty = allow everyone

  slack:
    bot_token: "${SLACK_BOT_TOKEN}"
    app_token: "${SLACK_APP_TOKEN}"

  # Ping you when the bot comes up (for a background service: right after the
  # machine boots) with a short system report — CPU/GPU temp, disk, internet
  # speed, each only if this machine can answer. Telegram/Slack only.
  startup_notice:
    enabled: true
    notify: []          # Telegram chat ids / Slack channel ids;
                        # Telegram falls back to allowed_user_ids when empty
    speedtest: true     # include internet speed (downloads speedtest_mb MB)
    speedtest_mb: 5

llm:
  base_url: "http://localhost:11434/v1"  # Ollama default
  model: "llama3.2"      # matches the code default and the quick-start `ollama pull`
  api_key: "ollama"      # Placeholder — required by openai SDK
  temperature: 0.7
  max_tokens: 4096
  timeout: 120.0

  # vLLM example:
  # base_url: "http://localhost:8000/v1"
  # model: "meta-llama/Llama-3.2-8B-Instruct"
  # api_key: "vllm"

  # OpenAI example:
  # base_url: "https://api.openai.com/v1"
  # model: "gpt-4o"
  # api_key: "${OPENAI_API_KEY}"

mcp:
  tools_dir: "./tools"
  hot_reload: true  # Reload tools on file change without restart
  # Records where `lesysbot tools install` got each package (repo, pinned commit).
  # Relative paths anchor next to this config, like tools_dir.
  lock_file: tools.lock.json

dashboard:
  enabled: false       # or run `lesysbot --dashboard`. Web UI to manage tools + LLM health.
  host: "127.0.0.1"    # localhost only, no auth — change deliberately if exposing
  port: 8765           # http://localhost:8765
  state_file: tool_state.json  # persists disabled tools (relative → ~/.lesysbot/)

agent:
  system_prompt: >
    You are a helpful assistant with access to tools.
    Use tools when they help answer the user's question.
    Be concise and clear.
  max_history: 50
  max_tool_calls: 10

logging:
  level: INFO                    # DEBUG | INFO | WARNING | ERROR | CRITICAL
  file: logs/lesysbot.log          # set to null to disable the application log
  trace_file: logs/traces.jsonl  # set to null to disable per-request traces
  # Both files rotate on time (TimedRotatingFileHandler) so they can't grow
  # without bound. `when` is the interval, `backup_count` how many to keep.
  when: midnight                 # midnight | H (hourly) | D | W0..W6 | S
  backup_count: 7                # keep ~7 days of dated files, then delete oldest
